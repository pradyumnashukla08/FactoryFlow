# ============================================
# FactoryFlow — Docker Compose
# ============================================
# Usage:
#   docker-compose up -d          (start)
#   docker-compose down           (stop)
#   docker-compose logs -f app    (follow app logs)

version: "3.8"

services:
  # ─── PostgreSQL ─────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: factoryflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FactoryFlow App ───────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5001
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: factoryflow
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-replace_me_with_a_64_char_random_string}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5001}
      LOG_LEVEL: info
    volumes:
      - app_logs:/app/server/logs

volumes:
  pgdata:
  app_logs:
